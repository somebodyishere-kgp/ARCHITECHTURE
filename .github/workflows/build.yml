name: ArchFlow Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a GitHub release after build
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag for manual runs (example: v0.2.0)
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Vite build check
        run: npx vite build

  # ─── Build Tauri App ────────────────────────────────────────────────────────
  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - platform: macos-14
            target: x86_64-apple-darwin
            artifact: macos-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: archflow-${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 7

  # ─── Create GitHub Release on tag push ──────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
        run: |
          if [ -z "${{ github.event.inputs.release_tag }}" ]; then
            echo "release_tag is required when create_release=true"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.release_tag }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          name: ArchFlow ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.release_tag }}
          body: |
            ## ArchFlow Desktop App
            
            Download the installer for your platform:
            - **Windows**: `.msi` (recommended) or `.exe` (NSIS installer)
            - **macOS Apple Silicon**: `.dmg`
            - **macOS Intel**: `.dmg`  
            - **Linux**: `.AppImage` (portable) or `.deb` (Debian/Ubuntu)
            
            ### What's included
            - 280+ CAD/BIM drafting tools
            - Full 3D modeling with PBR materials and SSAO
            - Zone/Room entities with fill and hatch patterns
            - DXF/PDF/IFC export, glTF/IFC import
            - Parametric dimensions, MEP tools, structural tools
            - Professional command bar with snap system
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
